server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA client-side routing ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block external access to internal webhook endpoint ───────────────────
    # MinIO calls the backend directly (http://app:5000); this rule prevents
    # browser / external clients from reaching it via the nginx proxy.
    location /api/webhooks/ {
        deny all;
        return 403;
    }

    # ── Proxy REST API requests to backend ───────────────────────────────────
    location /api/ {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # ── Proxy Socket.IO (WebSocket + long-polling) ───────────────────────────
    location /socket.io/ {
        proxy_pass             http://app:5000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     86400s;
    }

    # ── Proxy health endpoint ─────────────────────────────────────────────────
    location /health {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
